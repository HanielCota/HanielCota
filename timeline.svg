<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 880" fill="none">
  <defs>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#21262d"/>
      <stop offset="100%" stop-color="#30363d"/>
    </linearGradient>
    <linearGradient id="accentFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#58a6ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#c9d1d9" stroke-width="0.2" opacity="0.04"/>
    </pattern>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#010409" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="840" height="880" rx="16" fill="#0d1117"/>
  <rect width="840" height="880" rx="16" fill="url(#grid)"/>
  <rect x="0.5" y="0.5" width="839" height="879" rx="16" fill="none" stroke="#21262d" stroke-width="1"/>

  <!-- Title -->
  <text x="420" y="48" fill="#e6edf3" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="20" text-anchor="middle" letter-spacing="3">A JORNADA</text>
  <text x="420" y="68" fill="#484f58" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" text-anchor="middle" letter-spacing="2">CADA FASE ME TRANSFORMOU EM ALGO NOVO</text>
  <line x1="340" y1="82" x2="500" y2="82" stroke="url(#accentFade)" stroke-width="1"/>

  <!-- Timeline line -->
  <line x1="100" y1="108" x2="100" y2="840" stroke="#21262d" stroke-width="1.5"/>
  <line x1="100" y1="108" x2="100" y2="840" stroke="#21262d" stroke-width="1" stroke-dasharray="3,6" opacity="0.4"/>

  <!-- ═══ 2014 ═══ -->
  <circle cx="100" cy="132" r="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="100" cy="132" r="2" fill="#58a6ff"/>

  <rect x="20" y="122" width="44" height="20" rx="10" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
  <text x="42" y="136" fill="#8b949e" font-family="'JetBrains Mono', monospace" font-size="10" text-anchor="middle" font-weight="600">2014</text>

  <rect x="128" y="105" width="680" height="78" rx="10" fill="#161b22" filter="url(#cardShadow)"/>
  <rect x="128" y="105" width="680" height="78" rx="10" fill="none" stroke="#21262d" stroke-width="0.8"/>
  <rect x="128" y="105" width="3" height="78" rx="1.5" fill="#58a6ff" opacity="0.6"/>

  <text x="148" y="132" fill="#e6edf3" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600" font-size="14">O inicio  —  Minecraft</text>
  <text x="148" y="152" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="12">Abri o Eclipse pela primeira vez pra fazer um plugin de Minecraft.</text>
  <text x="148" y="172" fill="#484f58" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-style="italic">O /tpa funcionou. Nunca mais fui o mesmo.</text>

  <!-- ═══ 2015 ═══ -->
  <circle cx="100" cy="257" r="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="100" cy="257" r="2" fill="#58a6ff"/>

  <rect x="20" y="247" width="44" height="20" rx="10" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
  <text x="42" y="261" fill="#8b949e" font-family="'JetBrains Mono', monospace" font-size="10" text-anchor="middle" font-weight="600">2015</text>

  <rect x="128" y="230" width="680" height="78" rx="10" fill="#161b22" filter="url(#cardShadow)"/>
  <rect x="128" y="230" width="680" height="78" rx="10" fill="none" stroke="#21262d" stroke-width="0.8"/>
  <rect x="128" y="230" width="3" height="78" rx="1.5" fill="#58a6ff" opacity="0.5"/>

  <text x="148" y="257" fill="#e6edf3" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600" font-size="14">Servidor proprio</text>
  <text x="148" y="277" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="12">Bukkit, Spigot, NMS hacks. Players reais jogando no meu server.</text>
  <text x="148" y="297" fill="#484f58" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-style="italic">Java deixou de ser linguagem e virou a forma como eu penso.</text>

  <!-- ═══ 2017 ═══ -->
  <circle cx="100" cy="382" r="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="100" cy="382" r="2" fill="#58a6ff"/>

  <rect x="20" y="372" width="44" height="20" rx="10" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
  <text x="42" y="386" fill="#8b949e" font-family="'JetBrains Mono', monospace" font-size="10" text-anchor="middle" font-weight="600">2017</text>

  <rect x="128" y="355" width="680" height="78" rx="10" fill="#161b22" filter="url(#cardShadow)"/>
  <rect x="128" y="355" width="680" height="78" rx="10" fill="none" stroke="#21262d" stroke-width="0.8"/>
  <rect x="128" y="355" width="3" height="78" rx="1.5" fill="#58a6ff" opacity="0.4"/>

  <text x="148" y="382" fill="#e6edf3" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600" font-size="14">Descobrindo a Web</text>
  <text x="148" y="402" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="12">"Amor por linguagem nao paga boleto." Descobri HTML, CSS, JavaScript.</text>
  <text x="148" y="422" fill="#484f58" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-style="italic">O primeiro site no browser? A mesma magia do /tpa.</text>

  <!-- ═══ 2019 ═══ -->
  <circle cx="100" cy="507" r="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="100" cy="507" r="2" fill="#58a6ff"/>

  <rect x="20" y="497" width="44" height="20" rx="10" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
  <text x="42" y="511" fill="#8b949e" font-family="'JetBrains Mono', monospace" font-size="10" text-anchor="middle" font-weight="600">2019</text>

  <rect x="128" y="480" width="680" height="78" rx="10" fill="#161b22" filter="url(#cardShadow)"/>
  <rect x="128" y="480" width="680" height="78" rx="10" fill="none" stroke="#21262d" stroke-width="0.8"/>
  <rect x="128" y="480" width="3" height="78" rx="1.5" fill="#58a6ff" opacity="0.35"/>

  <text x="148" y="507" fill="#e6edf3" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600" font-size="14">TypeScript &amp; Frameworks</text>
  <text x="148" y="527" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="12">Tipagem? Sim, por favor. React, Next.js, Vue, Nuxt — playground infinito.</text>
  <text x="148" y="547" fill="#484f58" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-style="italic">CSS virou obsessao. Pixel perfect ou nada.</text>

  <!-- ═══ 2024 ═══ -->
  <circle cx="100" cy="632" r="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="100" cy="632" r="2" fill="#58a6ff"/>

  <rect x="20" y="622" width="44" height="20" rx="10" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
  <text x="42" y="636" fill="#8b949e" font-family="'JetBrains Mono', monospace" font-size="10" text-anchor="middle" font-weight="600">2024</text>

  <rect x="128" y="605" width="680" height="78" rx="10" fill="#161b22" filter="url(#cardShadow)"/>
  <rect x="128" y="605" width="680" height="78" rx="10" fill="none" stroke="#21262d" stroke-width="0.8"/>
  <rect x="128" y="605" width="3" height="78" rx="1.5" fill="#58a6ff" opacity="0.3"/>

  <text x="148" y="632" fill="#e6edf3" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600" font-size="14">Full-Stack em producao</text>
  <text x="148" y="652" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="12">SaaS rodando. Arquitetura limpa. Deploy todo dia.</text>
  <text x="148" y="672" fill="#484f58" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-style="italic">Codigo que sobrevive ao crescimento.</text>

  <!-- ═══ 2026 (current — with pulse) ═══ -->
  <circle cx="100" cy="757" r="10" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.3">
    <animate attributeName="r" values="8;14;8" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="757" r="6" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <circle cx="100" cy="757" r="2.5" fill="#58a6ff"/>

  <rect x="14" y="745" width="56" height="24" rx="12" fill="#58a6ff" opacity="0.12"/>
  <rect x="14" y="745" width="56" height="24" rx="12" fill="none" stroke="#58a6ff" stroke-width="0.8" opacity="0.4"/>
  <text x="42" y="761" fill="#58a6ff" font-family="'JetBrains Mono', monospace" font-size="10" text-anchor="middle" font-weight="700">2026</text>

  <rect x="128" y="727" width="680" height="86" rx="10" fill="#161b22" filter="url(#cardShadow)"/>
  <rect x="128" y="727" width="680" height="86" rx="10" fill="none" stroke="#58a6ff" stroke-width="0.8" opacity="0.3"/>
  <rect x="128" y="727" width="3" height="86" rx="1.5" fill="#58a6ff"/>

  <text x="148" y="755" fill="#e6edf3" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600" font-size="14">IA no desenvolvimento</text>
  <text x="148" y="775" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="12">Agentes, automacoes, AI-first workflows. Cursor, Copilot, Claude.</text>
  <text x="148" y="795" fill="#484f58" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-style="italic">A curiosidade daquele moleque de 2014? Mais forte que nunca.</text>

  <!-- NOW tag -->
  <rect x="757" y="735" width="38" height="18" rx="9" fill="#58a6ff" opacity="0.1"/>
  <rect x="757" y="735" width="38" height="18" rx="9" fill="none" stroke="#58a6ff" stroke-width="0.6" opacity="0.4"/>
  <text x="776" y="748" fill="#58a6ff" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle" font-weight="700" letter-spacing="1">NOW</text>

  <!-- Footer -->
  <line x1="300" y1="840" x2="540" y2="840" stroke="url(#accentFade)" stroke-width="0.8"/>
  <text x="420" y="862" fill="#484f58" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" text-anchor="middle" font-style="italic" letter-spacing="0.5">do eclipse ao cursor — a jornada nunca para</text>
</svg>
