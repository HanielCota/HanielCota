<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 900" fill="none">
  <defs>
    <!-- Gradients -->
    <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0e14"/>
    </linearGradient>
    <linearGradient id="card2014" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="card2015" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="card2017" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="card2019" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="card2024" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="card2026" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e9d5ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="nowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#e9d5ff"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#6d28d9" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- ══════════ Background ══════════ -->
  <rect width="840" height="900" rx="20" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#c084fc" stroke-width="0.3" opacity="0.04"/>
  </pattern>
  <rect width="840" height="900" rx="20" fill="url(#grid)"/>

  <!-- Border glow -->
  <rect x="1" y="1" width="838" height="898" rx="20" fill="none" stroke="url(#lineGrad)" stroke-width="1" opacity="0.2"/>

  <!-- ══════════ Title ══════════ -->
  <text x="420" y="52" fill="url(#titleGrad)" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="800" font-size="24" text-anchor="middle" letter-spacing="2">A JORNADA</text>
  <text x="420" y="74" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" text-anchor="middle" letter-spacing="3">CADA FASE ME TRANSFORMOU EM ALGO NOVO</text>

  <!-- Divider under title -->
  <line x1="320" y1="88" x2="520" y2="88" stroke="url(#lineGrad)" stroke-width="1" opacity="0.3"/>

  <!-- ══════════ Central Timeline Line ══════════ -->
  <!-- Glow layer -->
  <line x1="100" y1="115" x2="100" y2="860" stroke="#a855f7" stroke-width="8" opacity="0.08" filter="url(#softGlow)"/>
  <!-- Main line -->
  <line x1="100" y1="115" x2="100" y2="860" stroke="url(#lineGrad)" stroke-width="2" opacity="0.5"/>
  <!-- Dashed overlay for texture -->
  <line x1="100" y1="115" x2="100" y2="860" stroke="url(#lineGrad)" stroke-width="1" stroke-dasharray="4,8" opacity="0.3"/>

  <!-- ════════════════════════════════════════════ -->
  <!-- 2014 — Minecraft                             -->
  <!-- ════════════════════════════════════════════ -->
  <circle cx="100" cy="140" r="12" fill="#6d28d9" filter="url(#glow)" opacity="0.9"/>
  <circle cx="100" cy="140" r="5" fill="#c084fc"/>
  <circle cx="100" cy="140" r="2" fill="#fff"/>

  <!-- Year badge -->
  <rect x="15" y="128" width="56" height="24" rx="12" fill="#6d28d9" opacity="0.25"/>
  <rect x="15" y="128" width="56" height="24" rx="12" fill="none" stroke="#6d28d9" stroke-width="0.8" opacity="0.5"/>
  <text x="43" y="145" fill="#c084fc" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="12" text-anchor="middle" font-weight="700">2014</text>

  <!-- Card -->
  <rect x="130" y="110" width="680" height="85" rx="12" fill="url(#card2014)" filter="url(#cardShadow)"/>
  <rect x="130" y="110" width="680" height="85" rx="12" fill="none" stroke="#6d28d9" stroke-width="0.6" opacity="0.3"/>
  <!-- Accent bar -->
  <rect x="130" y="110" width="4" height="85" rx="2" fill="#6d28d9"/>

  <text x="152" y="140" fill="#c084fc" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="16">⛏️  O início — Minecraft</text>
  <text x="152" y="162" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="13">Abri o Eclipse pela primeira vez pra fazer um plugin de Minecraft.</text>
  <text x="152" y="182" fill="#6b7280" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-style="italic">O /tpa funcionou. Nunca mais fui o mesmo.</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- 2015 — Servidor                              -->
  <!-- ════════════════════════════════════════════ -->
  <circle cx="100" cy="260" r="12" fill="#7c3aed" filter="url(#glow)" opacity="0.9"/>
  <circle cx="100" cy="260" r="5" fill="#c084fc"/>
  <circle cx="100" cy="260" r="2" fill="#fff"/>

  <rect x="15" y="248" width="56" height="24" rx="12" fill="#7c3aed" opacity="0.25"/>
  <rect x="15" y="248" width="56" height="24" rx="12" fill="none" stroke="#7c3aed" stroke-width="0.8" opacity="0.5"/>
  <text x="43" y="265" fill="#c084fc" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="12" text-anchor="middle" font-weight="700">2015</text>

  <rect x="130" y="230" width="680" height="85" rx="12" fill="url(#card2015)" filter="url(#cardShadow)"/>
  <rect x="130" y="230" width="680" height="85" rx="12" fill="none" stroke="#7c3aed" stroke-width="0.6" opacity="0.3"/>
  <rect x="130" y="230" width="4" height="85" rx="2" fill="#7c3aed"/>

  <text x="152" y="260" fill="#c084fc" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="16">☕  Servidor próprio</text>
  <text x="152" y="282" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="13">Bukkit, Spigot, NMS hacks. Players reais jogando no meu server.</text>
  <text x="152" y="302" fill="#6b7280" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-style="italic">Java deixou de ser linguagem e virou a forma como eu penso.</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- 2017 — Web                                   -->
  <!-- ════════════════════════════════════════════ -->
  <circle cx="100" cy="380" r="12" fill="#8b5cf6" filter="url(#glow)" opacity="0.9"/>
  <circle cx="100" cy="380" r="5" fill="#c084fc"/>
  <circle cx="100" cy="380" r="2" fill="#fff"/>

  <rect x="15" y="368" width="56" height="24" rx="12" fill="#8b5cf6" opacity="0.25"/>
  <rect x="15" y="368" width="56" height="24" rx="12" fill="none" stroke="#8b5cf6" stroke-width="0.8" opacity="0.5"/>
  <text x="43" y="385" fill="#c084fc" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="12" text-anchor="middle" font-weight="700">2017</text>

  <rect x="130" y="350" width="680" height="85" rx="12" fill="url(#card2017)" filter="url(#cardShadow)"/>
  <rect x="130" y="350" width="680" height="85" rx="12" fill="none" stroke="#8b5cf6" stroke-width="0.6" opacity="0.3"/>
  <rect x="130" y="350" width="4" height="85" rx="2" fill="#8b5cf6"/>

  <text x="152" y="380" fill="#c084fc" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="16">💡  Descobrindo a Web</text>
  <text x="152" y="402" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="13">"Amor por linguagem não paga boleto." Descobri HTML, CSS, JavaScript.</text>
  <text x="152" y="422" fill="#6b7280" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-style="italic">O primeiro site no browser? A mesma magia do /tpa.</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- 2019 — TypeScript                             -->
  <!-- ════════════════════════════════════════════ -->
  <circle cx="100" cy="500" r="12" fill="#a855f7" filter="url(#glow)" opacity="0.9"/>
  <circle cx="100" cy="500" r="5" fill="#c084fc"/>
  <circle cx="100" cy="500" r="2" fill="#fff"/>

  <rect x="15" y="488" width="56" height="24" rx="12" fill="#a855f7" opacity="0.25"/>
  <rect x="15" y="488" width="56" height="24" rx="12" fill="none" stroke="#a855f7" stroke-width="0.8" opacity="0.5"/>
  <text x="43" y="505" fill="#e9d5ff" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="12" text-anchor="middle" font-weight="700">2019</text>

  <rect x="130" y="470" width="680" height="85" rx="12" fill="url(#card2019)" filter="url(#cardShadow)"/>
  <rect x="130" y="470" width="680" height="85" rx="12" fill="none" stroke="#a855f7" stroke-width="0.6" opacity="0.3"/>
  <rect x="130" y="470" width="4" height="85" rx="2" fill="#a855f7"/>

  <text x="152" y="500" fill="#c084fc" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="16">💜  TypeScript &amp; Frameworks</text>
  <text x="152" y="522" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="13">Tipagem? Sim, por favor. React, Next.js, Vue, Nuxt — playground infinito.</text>
  <text x="152" y="542" fill="#6b7280" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-style="italic">CSS virou obsessão. Pixel perfect ou nada.</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- 2024 — Full-Stack                             -->
  <!-- ════════════════════════════════════════════ -->
  <circle cx="100" cy="620" r="12" fill="#c084fc" filter="url(#glow)" opacity="0.9"/>
  <circle cx="100" cy="620" r="5" fill="#e9d5ff"/>
  <circle cx="100" cy="620" r="2" fill="#fff"/>

  <rect x="15" y="608" width="56" height="24" rx="12" fill="#c084fc" opacity="0.2"/>
  <rect x="15" y="608" width="56" height="24" rx="12" fill="none" stroke="#c084fc" stroke-width="0.8" opacity="0.5"/>
  <text x="43" y="625" fill="#e9d5ff" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="12" text-anchor="middle" font-weight="700">2024</text>

  <rect x="130" y="590" width="680" height="85" rx="12" fill="url(#card2024)" filter="url(#cardShadow)"/>
  <rect x="130" y="590" width="680" height="85" rx="12" fill="none" stroke="#c084fc" stroke-width="0.6" opacity="0.3"/>
  <rect x="130" y="590" width="4" height="85" rx="2" fill="#c084fc"/>

  <text x="152" y="620" fill="#c084fc" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="16">🚀  Full-Stack em produção</text>
  <text x="152" y="642" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="13">SaaS rodando. Arquitetura limpa. Deploy todo dia.</text>
  <text x="152" y="662" fill="#6b7280" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-style="italic">Código que sobrevive ao crescimento.</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- 2026 — AI (current, with pulse animation)     -->
  <!-- ════════════════════════════════════════════ -->
  <!-- Outer pulse ring -->
  <circle cx="100" cy="760" r="18" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.4">
    <animate attributeName="r" values="14;22;14" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="760" r="14" fill="#c084fc" filter="url(#glow)" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.6;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="760" r="6" fill="#e9d5ff"/>
  <circle cx="100" cy="760" r="2.5" fill="#fff"/>

  <!-- NOW badge -->
  <rect x="9" y="746" width="68" height="28" rx="14" fill="url(#nowGrad)" opacity="0.9"/>
  <text x="43" y="765" fill="#fff" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="12" text-anchor="middle" font-weight="800" letter-spacing="1">2026</text>

  <!-- Card with stronger border -->
  <rect x="130" y="725" width="680" height="95" rx="12" fill="url(#card2026)" filter="url(#cardShadow)"/>
  <rect x="130" y="725" width="680" height="95" rx="12" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.5"/>
  <rect x="130" y="725" width="4" height="95" rx="2" fill="#e9d5ff"/>

  <text x="152" y="757" fill="#e9d5ff" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="16">🤖  IA no desenvolvimento</text>
  <text x="152" y="779" fill="#8b949e" font-family="'Segoe UI', system-ui, sans-serif" font-size="13">Agentes, automações, AI-first workflows. Cursor, Copilot, Claude.</text>
  <text x="152" y="799" fill="#6b7280" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-style="italic">A curiosidade daquele moleque de 2014? Mais forte que nunca.</text>

  <!-- NOW tag on card -->
  <rect x="747" y="735" width="50" height="20" rx="10" fill="#c084fc" opacity="0.2"/>
  <rect x="747" y="735" width="50" height="20" rx="10" fill="none" stroke="#c084fc" stroke-width="0.8" opacity="0.5"/>
  <text x="772" y="749" fill="#c084fc" font-family="'JetBrains Mono', monospace" font-size="9" text-anchor="middle" font-weight="700" letter-spacing="1">NOW</text>

  <!-- ══════════ Footer quote ══════════ -->
  <line x1="270" y1="850" x2="570" y2="850" stroke="url(#lineGrad)" stroke-width="0.8" opacity="0.2"/>
  <text x="420" y="878" fill="#6b7280" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" text-anchor="middle" font-style="italic" letter-spacing="0.5">do eclipse ao cursor — a jornada nunca para</text>
</svg>
